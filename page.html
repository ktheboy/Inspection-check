<!DOCTYPE html>

<html class="dark" lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
    let imageBase64 = "";
    const defaultHeaderImage = "https://lh3.googleusercontent.com/aida/ADBb0ui2hWGRhlkulhwZr2jP2azK-Jhcb_WQE3A9n_w08pUSx5cpUVE-6ALFe2Ud3TaKy7OjAbNP9NaFYL9qImayJGUZmO3qhTTADEshCqs0Y-r-wFbCmekK_Ro3UJ-sngRRMYgeHVlXAUdIhO_UTOOiWyJ46FV10gJb3Z5076bFd1YED_AF2NOs4wMHM_UMVixV_k3uYWGZCTnz1a0ZuklRis46wsoaYtka7V1_4YzJTf57YT7ZweHpGLwNf1XH2n4NQ_S0_Etn9FC7fg";

    let currentUserId = localStorage.getItem("tk2_current_session_id");
    if (!currentUserId) {
        currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("tk2_current_session_id", currentUserId);
    }

    document.getElementById("avatarInput").addEventListener("change", function(e){
        const file = e.target.files[0];
        if(!file) return;
        if(!file.type.startsWith("image/")){
            alert("กรุณาเลือกไฟล์รูปภาพ!");
            return;
        }
        document.getElementById("fileName").textContent = file.name;
        const reader = new FileReader();
        reader.onload = function(){
            imageBase64 = reader.result;
            document.getElementById("preview").src = imageBase64;
        };
        reader.readAsDataURL(file);
    });

    function loadUsers(){
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const list = document.getElementById("userList");
        const count = document.getElementById("countUser");
        const emptyState = document.getElementById("emptyState");
        
        list.innerHTML = "";
        
        if(users.length === 0) {
            list.appendChild(emptyState);
            emptyState.style.display = "block";
        } else {
            emptyState.style.display = "none";
            users.forEach(user => {
                const isOwnEntry = user.sessionId === currentUserId;
                const card = document.createElement("div");
                
                card.className = "flex items-center gap-4 p-4 bg-[#11111a] border-l-[4px] border-red-600 rounded-r-2xl rounded-l-sm animate-fade-in shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-blur-md relative overflow-hidden group border border-gray-800/40 hover:border-red-600/30 transition-all duration-300";
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/5 rounded-full -mr-16 -mt-16 blur-3xl group-hover:bg-red-600/10 transition-colors"></div>
<div class="relative flex-shrink-0">
<img class="w-14 h-14 rounded-full object-cover border-2 border-gray-800 group-hover:border-red-600/40 transition-colors shadow-lg" src="${user.image || defaultHeaderImage}"/>
<div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 rounded-full border-[3px] border-[#0d0d15]"></div>
</div>
<div class="flex-1 min-w-0">
<p class="font-bold text-gray-100 text-[16px] truncate heading-font tracking-tight mb-0.5">${user.discord}</p>
<div class="flex items-center gap-2">
<span class="text-[9px] bg-red-950/40 text-red-400 px-1.5 py-0.5 rounded-sm border border-red-900/20 font-black uppercase tracking-widest flex items-center gap-1">MEMBER</span>
<p class="text-[13px] text-gray-400 font-medium truncate opacity-70 tracking-wide font-body">${user.nickname} • ${user.age} ปี</p>
</div>
</div>
                    ${isOwnEntry ? `
                    <div class="flex gap-1 z-10">
<button class="p-2 text-gray-500 hover:text-[#7c4dff] transition-colors active:scale-90" onclick="editUser('${user.id}')">
<span class="material-symbols-outlined text-[20px]">edit_square</span>
</button>
<button class="p-2 text-gray-500 hover:text-red-500 transition-colors active:scale-90" onclick="deleteUser('${user.id}')">
<span class="material-symbols-outlined text-[20px]">delete_forever</span>
</button>
</div>
                    ` : ''}
                `;
                list.appendChild(card);
            });
        }
        if (count) count.textContent = users.length;
    }

    window.editUser = function(id) {
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const user = users.find(u => u.id === id);
        if (user && user.sessionId === currentUserId) {
            document.getElementById("userId").value = user.id;
            document.getElementById("discord").value = user.discord;
            document.getElementById("nickname").value = user.nickname;
            document.getElementById("age").value = user.age;
            document.getElementById("preview").src = user.image;
            imageBase64 = user.image;
            document.getElementById("btnText").textContent = "อัปเดตข้อมูล ⚡";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.deleteUser = function(id) {
        let users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const user = users.find(u => u.id === id);
        if (user && user.sessionId === currentUserId) {
            if(confirm("ยืนยันการลบข้อมูลของคุณ?")) {
                users = users.filter(u => u.id !== id);
                localStorage.setItem("tk2_users", JSON.stringify(users));
                loadUsers();
            }
        }
    };

    document.getElementById("saveBtn").addEventListener("click", function(){
        const idInput = document.getElementById("userId");
        const discord = document.getElementById("discord").value.trim();
        const nickname = document.getElementById("nickname").value.trim();
        const age = document.getElementById("age").value;
        
        if(!discord || !nickname || !age){
            alert("กรุณากรอกข้อมูลให้ครบถ้วน!");
            return;
        }
        
        let users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        
        if(idInput.value) {
            const index = users.findIndex(u => u.id === idInput.value);
            if(index !== -1 && users[index].sessionId === currentUserId) {
                users[index] = {
                    ...users[index],
                    discord,
                    nickname,
                    age,
                    image: imageBase64 || users[index].image || defaultHeaderImage
                };
            }
        } else {
            const existingIndex = users.findIndex(u => u.sessionId === currentUserId);
            if (existingIndex !== -1) {
                if(!confirm("คุณมีชื่อในระบบอยู่แล้ว ต้องการบันทึกข้อมูลใหม่แทนที่ข้อมูลเดิมใช่ไหม?")) return;
                users.splice(existingIndex, 1);
            }
            
            users.unshift({
                id: Date.now().toString(),
                sessionId: currentUserId,
                discord,
                nickname,
                age,
                image: imageBase64 || defaultHeaderImage
            });
        }
        
        localStorage.setItem("tk2_users", JSON.stringify(users));
        loadUsers();
        
        idInput.value = "";
        document.getElementById("discord").value = "";
        document.getElementById("nickname").value = "";
        document.getElementById("age").value = "";
        document.getElementById("fileName").textContent = "ยังไม่ได้เลือกไฟล์";
        document.getElementById("preview").src = defaultHeaderImage;
        document.getElementById("btnText").textContent = "บันทึกข้อมูล ⚡";
        imageBase64 = "";
        
        const btn = this;
        const originalContent = btn.innerHTML;
        btn.innerHTML = "สำเร็จ! ✓";
        btn.classList.replace("bg-[#7c4dff]", "bg-green-600");
        setTimeout(() => {
            btn.innerHTML = originalContent;
            btn.classList.replace("bg-green-600", "bg-[#7c4dff]");
        }, 2000);
    });

    window.filterUsers = function() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const list = document.getElementById("userList");
        const cards = Array.from(list.children).filter(c => c.id !== "emptyState");

        let hasResults = false;
        
        cards.forEach((card, index) => {
            const user = users[index];
            if (!user) return;

            const match = user.discord.toLowerCase().includes(searchTerm) || 
                          user.nickname.toLowerCase().includes(searchTerm);
            
            if (match) {
                card.style.display = "flex";
                hasResults = true;
            } else {
                card.style.display = "none";
            }
        });

        const emptyState = document.getElementById("emptyState");
        if (!hasResults && users.length > 0) {
            emptyState.style.display = "block";
            emptyState.querySelector('h3').textContent = "ไม่พบข้อมูลที่ค้นหา";
            emptyState.querySelector('p').textContent = "ลองพิมพ์ชื่ออื่น หรือตรวจสอบตัวสะกด";
        } else if (users.length === 0) {
            emptyState.style.display = "block";
            emptyState.querySelector('h3').textContent = "ยังไม่มีสมาชิกเช็คชื่อ";
            emptyState.querySelector('p').textContent = "ร่วมเป็นส่วนหนึ่งของเซิร์ฟเวอร์โดยการลงทะเบียนด้านบน";
        } else {
            emptyState.style.display = "none";
        }
    };

    loadUsers();
</script>
<style>

            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Manrope', sans-serif;

            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .animate-fade-in { animation: fade-in 0.4s ease; }

        .glow-red {

        }

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0d0d15;
        }
        ::-webkit-scrollbar-thumb {
            background: #7c4dff;

        }

            color: #4b5563;

        }
        .label-style {
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.025em;
        }
    </style>
</head>

            </h3>

</div><button class="w-full bg-[#7c4dff] hover:bg-[#6a3de8] active:scale-[0.98] transition-all py-3 rounded-2xl font-bold text-[16px] text-white shadow-xl shadow-purple-900/30 flex items-center justify-center gap-2 mb-12 heading-font" id="saveBtn">

</button>
<!-- Search Bar -->

<script>
    let imageBase64 = "";
    const defaultHeaderImage = "https://lh3.googleusercontent.com/aida/ADBb0ui2hWGRhlkulhwZr2jP2azK-Jhcb_WQE3A9n_w08pUSx5cpUVE-6ALFe2Ud3TaKy7OjAbNP9NaFYL9qImayJGUZmO3qhTTADEshCqs0Y-r-wFbCmekK_Ro3UJ-sngRRMYgeHVlXAUdIhO_UTOOiWyJ46FV10gJb3Z5076bFd1YED_AF2NOs4wMHM_UMVixV_k3uYWGZCTnz1a0ZuklRis46wsoaYtka7V1_4YzJTf57YT7ZweHpGLwNf1XH2n4NQ_S0_Etn9FC7fg";

    let currentUserId = localStorage.getItem("tk2_current_session_id");
    if (!currentUserId) {
        currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("tk2_current_session_id", currentUserId);
    }

    document.getElementById("avatarInput").addEventListener("change", function(e){
        const file = e.target.files[0];
        if(!file) return;
        if(!file.type.startsWith("image/")){
            alert("กรุณาเลือกไฟล์รูปภาพ!");
            return;
        }
        document.getElementById("fileName").textContent = file.name;
        const reader = new FileReader();
        reader.onload = function(){
            imageBase64 = reader.result;
            document.getElementById("preview").src = imageBase64;
        };
        reader.readAsDataURL(file);
    });

    function checkSubmissionStatus() {
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const hasSubmitted = users.some(u => u.sessionId === currentUserId);
        const formElements = [document.querySelector('.mb-8:has(#avatarInput)'), document.querySelector('.space-y-6.mb-10'), document.getElementById('saveBtn')];
        const statusMsg = document.getElementById('alreadyCheckedIn');

        if (hasSubmitted) {
            formElements.forEach(el => el && el.classList.add('hidden'));
            statusMsg.classList.remove('hidden');
        } else {
            formElements.forEach(el => el && el.classList.remove('hidden'));
            statusMsg.classList.add('hidden');
        }
    }

    function loadUsers(){
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const list = document.getElementById("userList");
        const count = document.getElementById("countUser");
        const emptyState = document.getElementById("emptyState");
        
        list.innerHTML = "";
        
        if(users.length === 0) {
            list.appendChild(emptyState);
            emptyState.style.display = "block";
        } else {
            emptyState.style.display = "none";
            users.forEach(user => {
                const isOwnEntry = user.sessionId === currentUserId;
                const card = document.createElement("div");
                
                card.className = "flex items-center gap-4 p-4 bg-[#11111a] border-l-[4px] border-red-600 rounded-r-2xl rounded-l-sm animate-fade-in shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-blur-md relative overflow-hidden group border border-gray-800/40 hover:border-red-600/30 transition-all duration-300";
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/5 rounded-full -mr-16 -mt-16 blur-3xl group-hover:bg-red-600/10 transition-colors"></div>
<div class="relative flex-shrink-0">
<img class="w-14 h-14 rounded-full object-cover border-2 border-gray-800 group-hover:border-red-600/40 transition-colors shadow-lg" src="${user.image || defaultHeaderImage}"/>
<div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 rounded-full border-[3px] border-[#0d0d15]"></div>
</div>
<div class="flex-1 min-w-0">
<p class="font-bold text-gray-100 text-[16px] truncate heading-font tracking-tight mb-0.5">${user.discord}</p>
<div class="flex items-center gap-2">
<span class="text-[9px] bg-red-950/40 text-red-400 px-1.5 py-0.5 rounded-sm border border-red-900/20 font-black uppercase tracking-widest flex items-center gap-1">MEMBER</span>
<p class="text-[13px] text-gray-400 font-medium truncate opacity-70 tracking-wide font-body">${user.nickname} • ${user.age} ปี</p>
</div>
</div>
                    ${isOwnEntry ? `
                    <div class="flex gap-1 z-10">
<button class="p-2 text-gray-500 hover:text-[#7c4dff] transition-colors active:scale-90" onclick="deleteUser('${user.id}')">
<span class="material-symbols-outlined text-[20px]">delete_forever</span>
</button>
</div>
                    ` : ''}
                `;
                list.appendChild(card);
            });
        }
        if (count) count.textContent = users.length;
        checkSubmissionStatus();
    }

    window.deleteUser = function(id) {
        let users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const user = users.find(u => u.id === id);
        if (user && user.sessionId === currentUserId) {
            if(confirm("ยืนยันการลบข้อมูลของคุณ? คุณสามารถเช็คชื่อใหม่ได้หลังจากการลบ")) {
                users = users.filter(u => u.id !== id);
                localStorage.setItem("tk2_users", JSON.stringify(users));
                loadUsers();
            }
        }
    };

    document.getElementById("saveBtn").addEventListener("click", function(){
        const idInput = document.getElementById("userId");
        const discord = document.getElementById("discord").value.trim();
        const nickname = document.getElementById("nickname").value.trim();
        const age = document.getElementById("age").value;
        
        if(!discord || !nickname || !age){
            alert("กรุณากรอกข้อมูลให้ครบถ้วน!");
            return;
        }
        
        let users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        
        users.unshift({
            id: Date.now().toString(),
            sessionId: currentUserId,
            discord,
            nickname,
            age,
            image: imageBase64 || defaultHeaderImage
        });
        
        localStorage.setItem("tk2_users", JSON.stringify(users));
        
        idInput.value = "";
        document.getElementById("discord").value = "";
        document.getElementById("nickname").value = "";
        document.getElementById("age").value = "";
        document.getElementById("fileName").textContent = "ยังไม่ได้เลือกไฟล์";
        document.getElementById("preview").src = defaultHeaderImage;
        imageBase64 = "";
        
        loadUsers();
    });

    window.filterUsers = function() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const users = JSON.parse(localStorage.getItem("tk2_users")) || [];
        const list = document.getElementById("userList");
        const cards = Array.from(list.children).filter(c => c.id !== "emptyState");

        let hasResults = false;
        
        cards.forEach((card, index) => {
            const user = users[index];
            if (!user) return;

            const match = user.discord.toLowerCase().includes(searchTerm) || 
                          user.nickname.toLowerCase().includes(searchTerm);
            
            if (match) {
                card.style.display = "flex";
                hasResults = true;
            } else {
                card.style.display = "none";
            }
        });

        const emptyState = document.getElementById("emptyState");
        if (!hasResults && users.length > 0) {
            emptyState.style.display = "block";
            emptyState.querySelector('h3').textContent = "ไม่พบข้อมูลที่ค้นหา";
            emptyState.querySelector('p').textContent = "ลองพิมพ์ชื่ออื่น หรือตรวจสอบตัวสะกด";
        } else if (users.length === 0) {
            emptyState.style.display = "block";
            emptyState.querySelector('h3').textContent = "ยังไม่มีสมาชิกเช็คชื่อ";
            emptyState.querySelector('p').textContent = "ร่วมเป็นส่วนหนึ่งของเซิร์ฟเวอร์โดยการลงทะเบียนด้านบน";
        } else {
            emptyState.style.display = "none";
        }
    };

    loadUsers();
</script>
</body></html>
